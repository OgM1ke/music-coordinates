<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Музыкальные Координаты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Старт -->
        <div id="start-screen" class="screen active">
            <div class="start-content">
                <div class="logo-area">
                    <div class="logo-icon">🎵</div>
                    <h1 class="title">Музыкальные<br>координаты</h1>
                    <p class="subtitle">Узнай свою тёмную сторону</p>
                </div>
                <button id="start-btn" class="btn-primary">Начать</button>
            </div>
        </div>

        <!-- Модалка подписки -->
        <div id="subscribe-modal" class="modal hidden">
            <div class="modal-sheet">
                <div class="modal-header">
                    <h3 class="modal-title">Подписка на канал</h3>
                    <p class="modal-desc">Для прохождения теста подпишись на канал о музыке и культуре</p>
                </div>
                <div class="modal-actions">
                    <button id="subscribe-btn" class="btn-primary">Подписаться</button>
                    <button id="check-sub-btn" class="btn-outline">Проверить подписку</button>
                </div>
            </div>
        </div>

        <!-- Тест -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <button class="back-btn" id="quiz-back">←</button>
                <span class="progress-text" id="progress-text">1 / 30</span>
                <div style="width: 40px;"></div>
            </div>

            <div class="question-card">
                <div class="meme-image empty" id="meme-image">
                    <img src="" alt="" id="meme-img">
                </div>
                <p class="question-text" id="question-text"></p>
            </div>

            <div class="answers-list" id="answers-list"></div>
        </div>

        <!-- Результат -->
        <div id="result-screen" class="screen">
            <div class="result-header">Твой музыкальный архетип</div>
            
            <div class="chart-container">
                <div class="chart-grid">
                    <div class="chart-line horizontal"></div>
                    <div class="chart-line vertical"></div>
                </div>
                <div class="chart-labels">
                    <span class="chart-label top">Элитарное</span>
                    <span class="chart-label bottom">Массовое</span>
                    <span class="chart-label left">Андеграунд</span>
                    <span class="chart-label right">Мейнстрим</span>
                </div>
                <div class="result-point" id="result-point"></div>
            </div>

            <h2 class="archetype-title" id="archetype-title"></h2>
            <p class="archetype-desc" id="archetype-desc"></p>
            <div class="percentage-badge" id="percentage-badge"></div>
        </div>

        <!-- Друзья -->
        <div id="friends-screen" class="screen">
            <h1 class="screen-title">Друзья</h1>
            <div id="friends-list">
                <p style="color: var(--text-secondary); text-align: center; padding: 40px;">Пока никто не прошёл тест</p>
            </div>
        </div>

        <!-- Навигация -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-item active" data-screen="quiz">
                <span class="nav-icon">⊞</span>
                <span class="nav-label">Тест</span>
            </button>
            <button class="nav-item" data-screen="result" id="nav-result" disabled>
                <span class="nav-icon">◯</span>
                <span class="nav-label">Результат</span>
            </button>
            <button class="nav-item" data-screen="friends">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Друзья</span>
            </button>
            <button class="nav-item" data-screen="share">
                <span class="nav-icon">↗</span>
                <span class="nav-label">Поделиться</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
